<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미캔&기타스톡 인증 체크</title>
<style>
  body { font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; max-width: 720px; margin: 0 auto; padding: 16px; background: #f7f7f5; }
  h1 { font-size: 18px; }
  .add-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .add-row input { flex: 1; padding: 8px; }
  .add-row button, #search { padding: 8px; }
  #search { width: 100%; box-sizing: border-box; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
  th, td { padding: 8px 6px; text-align: center; font-size: 13px; border-bottom: 1px solid #eee; }
  th { background: #fafafa; }
  td.name { text-align: left; }
  #status { font-size: 12px; color: #1d9e75; height: 16px; margin-bottom: 8px; }
  input[type=number] { width: 44px; }
  .summary { display: flex; gap: 10px; margin-bottom: 16px; }
  .summary div { background: white; border-radius: 8px; padding: 10px 14px; flex: 1; }
  .summary .label { font-size: 12px; color: #888; }
  .summary .num { font-size: 20px; font-weight: bold; }
  tr.incomplete { background: #fdeceb; }
  tr.rest-row { background: #f0f0ee; color: #999; }
  .legend { display: flex; gap: 16px; font-size: 12px; color: #888; margin-bottom: 10px; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
</style>
</head>
<body>
  <h1>미캔&기타스톡 인증 체크</h1>
  <div id="champions" style="display:flex; gap:10px; margin-bottom:14px;">
    <div style="flex:1; background:linear-gradient(135deg,#fff7d6,#ffe9a8); border-radius:10px; padding:12px 14px;">
      <div style="font-size:12px; color:#8a6d00;" id="lastMonthLabel">지난달 인증왕</div>
      <div style="font-size:16px; font-weight:bold; margin-top:4px;" id="lastMonthChamp">불러오는 중...</div>
    </div>
    <div style="flex:1; background:linear-gradient(135deg,#fff1cc,#ffd24d); border-radius:10px; padding:12px 14px;">
      <div style="font-size:12px; color:#7a5200;" id="thisMonthLabel">이번달 인증왕 🏆</div>
      <div style="font-size:16px; font-weight:bold; margin-top:4px;" id="thisMonthChamp">불러오는 중...</div>
    </div>
  </div>
  <div class="add-row">
    <label for="monthSelect" style="display:flex; align-items:center; font-size:13px; color:#555;">월:</label>
    <select id="monthSelect" onchange="loadData()" style="padding:8px;">
      <option value="2026-06">2026년 6월</option>
      <option value="2026-07">2026년 7월</option>
      <option value="2026-08">2026년 8월</option>
      <option value="2026-09">2026년 9월</option>
      <option value="2026-10">2026년 10월</option>
      <option value="2026-11">2026년 11월</option>
      <option value="2026-12">2026년 12월</option>
    </select>
  </div>
  <div class="summary">
    <div><div class="label">전체 인원</div><div class="num" id="totalCount">0</div></div>
    <div><div class="label">이번달 인증완료(4/4)</div><div class="num" id="doneCount">0</div></div>
    <div><div class="label">휴식</div><div class="num" id="restCount">0</div></div>
  </div>
  <div class="add-row">
    <input id="newName" type="text" placeholder="새 멤버 아이디"/>
    <button onclick="addMember()">추가</button>
    <button onclick="toggleBulk()">목록 일괄 추가</button>
  </div>
  <div id="bulkBox" style="display:none; margin-bottom:12px;">
    <textarea id="bulkText" rows="6" style="width:100%; box-sizing:border-box; padding:8px;" placeholder="엑셀에서 이름 한 줄에 하나씩 복사해서 여기 붙여넣으세요"></textarea>
    <button onclick="bulkAdd()" style="margin-top:6px;">일괄 등록</button>
  </div>
  <input id="search" type="text" placeholder="이름 검색..." oninput="renderTable()"/>
  <div id="status"></div>
  <div class="legend">
    <span><i style="background:#fdeceb;"></i>미달성</span>
    <span><i style="background:#f0f0ee;"></i>휴식</span>
  </div>
  <table>
    <thead>
      <tr><th>No</th><th>아이디</th><th>휴식</th><th>1</th><th>2</th><th>3</th><th>4</th><th>추가</th><th>인증수</th><th>관리</th></tr>
    </thead>
    <tbody id="tbody"><tr><td colspan="10">불러오는 중...</td></tr></tbody>
  </table>

<script>
// 여기에 Apps Script 배포 후 받은 웹 앱 URL을 넣으세요
const API_URL = 'https://script.google.com/macros/s/AKfycbwI1hIu8GtUgY7NRMnrLQunINp3J6AeMODK7PCtRLk6oJ26zAGDfgVjus3X_9ZNjWkp/exec';

let members = [];

function getMonth() {
  return document.getElementById('monthSelect').value;
}

function monthLabel(m) {
  const [y, mo] = m.split('-');
  return `${y}년 ${parseInt(mo)}월`;
}

function shiftMonth(monthStr, delta) {
  const [y, m] = monthStr.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function topPerformer(list) {
  if (!list || list.length === 0) return null;
  const ranked = list
    .filter(m => !m.rest)
    .map(m => ({ name: m.name, total: m.days.filter(Boolean).length + m.extra }))
    .sort((a, b) => b.total - a.total);
  return ranked.length && ranked[0].total > 0 ? ranked[0] : null;
}

async function loadChampions() {
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  const lastMonth = shiftMonth(thisMonth, -1);

  document.getElementById('thisMonthLabel').textContent = `${monthLabel(thisMonth)} 인증왕 🏆`;
  document.getElementById('lastMonthLabel').textContent = `${monthLabel(lastMonth)} 인증왕`;

  try {
    const [thisRes, lastRes] = await Promise.all([
      fetch(`${API_URL}?month=${thisMonth}`).then(r => r.json()),
      fetch(`${API_URL}?month=${lastMonth}`).then(r => r.json())
    ]);
    const thisTop = topPerformer(thisRes.members);
    const lastTop = topPerformer(lastRes.members);
    document.getElementById('thisMonthChamp').textContent = thisTop ? `${thisTop.name} (${thisTop.total}회)` : '아직 없음';
    document.getElementById('lastMonthChamp').textContent = lastTop ? `${lastTop.name} (${lastTop.total}회)` : '기록 없음';
  } catch (e) {
    document.getElementById('thisMonthChamp').textContent = '불러오기 실패';
    document.getElementById('lastMonthChamp').textContent = '불러오기 실패';
  }
}

async function loadData() {
  setStatus('불러오는 중...');
  const res = await fetch(`${API_URL}?month=${getMonth()}`);
  const data = await res.json();
  members = data.members;
  renderTable();
  setStatus('');
  loadChampions();
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function renderTable() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let done = 0, rest = 0;
  members.forEach(m => {
    if (m.rest) rest++;
    if (m.days.filter(Boolean).length === 4) done++;
  });

  // 원래 순서는 유지하되, 휴식인 사람만 맨 아래로 보냄 (안정 정렬)
  const scored = members
    .map((m, originalIdx) => ({ ...m, originalIdx, total: m.rest ? -1 : m.days.filter(Boolean).length + m.extra }))
    .sort((a, b) => {
      if (a.rest !== b.rest) return a.rest ? 1 : -1;
      return a.originalIdx - b.originalIdx;
    });
  const uniqueScoresDesc = [...new Set(scored.filter(m => m.total > 0).map(m => m.total))].sort((a, b) => b - a);
  const goldScore = uniqueScoresDesc[0];
  const silverScore = uniqueScoresDesc[1];

  scored.forEach((m, idx) => {
    if (q && !m.name.toLowerCase().includes(q)) return;
    const checkedCount = m.days.filter(Boolean).length;
    const total = m.rest ? '-' : checkedCount + m.extra;
    const tr = document.createElement('tr');
    if (m.rest) {
      tr.className = 'rest-row';
    } else if (checkedCount < 4) {
      tr.className = 'incomplete';
    }
    let medal = '';
    if (!m.rest && m.total > 0) {
      if (m.total === goldScore) medal = ' 🥇';
      else if (m.total === silverScore) medal = ' 🥈';
    }
    tr.innerHTML = `
      <td>${idx + 1}${medal}</td>
      <td class="name"><span id="name-${m.row}">${m.name}</span></td>
      <td><input type="checkbox" ${m.rest ? 'checked' : ''} onchange="updateField(${m.row}, 'rest', this.checked)"/></td>
      ${m.days.map((d, i) => `<td><input type="checkbox" ${d ? 'checked' : ''} ${m.rest ? 'disabled' : ''} onchange="updateDay(${m.row}, ${i}, this.checked)"/></td>`).join('')}
      <td><input type="number" min="0" value="${m.extra}" ${m.rest ? 'disabled' : ''} onchange="updateField(${m.row}, 'extra', parseInt(this.value)||0)"/></td>
      <td><b>${total}</b></td>
      <td>
        <button style="padding:4px 6px; font-size:12px;" onclick="renameMember(${m.row}, '${m.name.replace(/'/g, "\\'")}')">수정</button>
        <button style="padding:4px 6px; font-size:12px;" onclick="deleteMember(${m.row}, '${m.name.replace(/'/g, "\\'")}')">삭제</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('totalCount').textContent = members.length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('restCount').textContent = rest;
}

function findMember(row) {
  return members.find(m => m.row === row);
}

async function pushUpdate(m) {
  setStatus('저장 중...');
  await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'update', month: getMonth(), row: m.row, rest: m.rest, days: m.days, extra: m.extra })
  });
  setStatus('저장됨');
  setTimeout(() => setStatus(''), 1200);
}

function updateDay(row, dayIdx, checked) {
  const m = findMember(row);
  m.days[dayIdx] = checked;
  renderTable();
  pushUpdate(m);
}

function updateField(row, field, value) {
  const m = findMember(row);
  m[field] = value;
  renderTable();
  pushUpdate(m);
}

async function addMember() {
  const input = document.getElementById('newName');
  const name = input.value.trim();
  if (!name) return;
  setStatus('추가 중...');
  await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'add', month: getMonth(), name })
  });
  input.value = '';
  await loadData();
}

async function renameMember(row, oldName) {
  const newName = prompt('새 이름을 입력하세요', oldName);
  if (!newName || newName.trim() === '' || newName === oldName) return;
  setStatus('수정 중...');
  await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'rename', month: getMonth(), row, name: newName.trim() })
  });
  await loadData();
}

async function deleteMember(row, name) {
  if (!confirm(`${name} 님을 삭제할까요?`)) return;
  setStatus('삭제 중...');
  await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'delete', month: getMonth(), row })
  });
  await loadData();
}

function toggleBulk() {
  const box = document.getElementById('bulkBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

async function bulkAdd() {
  const text = document.getElementById('bulkText').value;
  const names = text.split('\n').map(s => s.trim()).filter(Boolean);
  if (names.length === 0) return;
  setStatus(`${names.length}명 추가 중...`);
  for (const name of names) {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'add', month: getMonth(), name })
    });
  }
  document.getElementById('bulkText').value = '';
  document.getElementById('bulkBox').style.display = 'none';
  await loadData();
}

loadData();
</script>
</body>
</html>
